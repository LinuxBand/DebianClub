<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Debian swirl circle decoration -->
  <circle cx="1050" cy="120" r="180" fill="#d41443" opacity="0.12"/>
  <circle cx="1050" cy="120" r="120" fill="#d41443" opacity="0.1"/>
  <!-- Left accent bar -->
  <rect x="60" y="180" width="6" height="270" fill="#d41443" rx="3"/>
  <!-- Title -->
  <text x="100" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Debian.Club</text>
  <!-- Subtitle -->
  <text x="100" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a0aec0">Complete Debian Linux Guide</text>
  <!-- Tags -->
  <rect x="100" y="400" width="180" height="44" rx="22" fill="#d41443" opacity="0.9"/>
  <text x="190" y="428" font-family="system-ui, sans-serif" font-size="18" fill="#fff" text-anchor="middle">Debian 13</text>
  <rect x="296" y="400" width="200" height="44" rx="22" fill="#2d3748" opacity="0.9"/>
  <text x="396" y="428" font-family="system-ui, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">8 Languages</text>
  <rect x="512" y="400" width="220" height="44" rx="22" fill="#2d3748" opacity="0.9"/>
  <text x="622" y="428" font-family="system-ui, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">50,000+ Packages</text>
  <!-- URL -->
  <text x="100" y="530" font-family="system-ui, sans-serif" font-size="22" fill="#718096">www.debian.club</text>
</svg>
